name: Employee Management CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
      - name: Verify Application
        run: |
          cd app
          python app.py &
          sleep 5
          curl http://127.0.0.1:5000/health
      - name: Build Docker Image
        run: |
          docker build -t employee-management:${{ github.sha }} .
      - name: Login to Docker Hub
        uses: docker/login-action@v3 
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.ACCESS_TOKEN }}
      - name: Push Docker Image
        run: |
          docker tag employee-management:${{ github.sha }} ramanjaneyalup8/employee-management:${{ github.sha }}
          docker push ramanjaneyalup8/employee-management:${{ github.sha }}
  deploy:
    name: Deploy to EC2

    needs: build

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Execute commands on EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            echo "Connected Successfully"

            whoami

            pwd

            date

            hostname

            docker --version

            docker ps


